name: macro_pantry_chef
description: "Macro Pantry Chef — Smart nutrition and recipe mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Routing
  go_router: ^14.0.0

  # Networking
  dio: ^5.7.0

  # Responsive
  flutter_screenutil: ^5.9.3

  # Local Storage
  shared_preferences: ^2.3.0

  # Typography
  google_fonts: ^6.2.1

  # Localization
  intl: any

  # Models (annotations — needed at runtime)
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  flutter_gen: ^5.14.1
  share_plus: ^13.2.0
  image_picker: ^1.2.2
  path_provider: ^2.1.6
  wakelock_plus: ^1.6.1
  translator: ^1.0.4+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true
